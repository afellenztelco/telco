<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | ALTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4" style="width: 350px;">
        <h5 class="text-primary text-center mb-4 font-weight-bold">GESTION DE ENLACES DE TELCOMUNICACIONES</h5>
        
        <div id="errorAlert" class="alert alert-danger d-none text-center py-2 mb-3" style="font-size: 0.8rem;">
            Usuario o contraseña incorrectos
        </div>

        <form action="/login" method="POST">
            <div class="mb-3 text-start">
                <label for="username" class="form-label mb-1" style="font-size: 0.8rem;">Usuario</label>
                <input type="text" class="form-control form-control-sm" id="username" name="username" required autocomplete="username">
            </div>
            <div class="mb-4 text-start">
                <label for="password" class="form-label mb-1" style="font-size: 0.8rem;">Contraseña</label>
                <input type="password" class="form-control form-control-sm" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-sm">INGRESAR</button>
        </form>
    </div>

    <script>
        // Muestra dinámicamente el mensaje si la URL trae la marca de error
        const parametros = new URLSearchParams(window.location.search);
        if (parametros.has('error')) {
            document.getElementById('errorAlert').classList.remove('d-none');
        }
    </script>
</body>
</html>
